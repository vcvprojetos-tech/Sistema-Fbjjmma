name: Deploy para VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            echo "==> Atualizando código..."
            cd /var/www/fbjjmma
            git pull origin main
            echo "==> Gerando cliente Prisma..."
            npx prisma generate
            echo "==> Compilando..."
            rm -rf .next
            npm run build
            echo "==> Reiniciando servidor..."
            pm2 stop fbjjmma 2>/dev/null || pm2 stop all 2>/dev/null || true
            pm2 delete fbjjmma 2>/dev/null || pm2 delete all 2>/dev/null || true
            pm2 start npm --name fbjjmma -- start
            pm2 save
            echo "==> Deploy concluído!"
