name: Deploy para VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            echo "==> Atualizando código..."
            cd /var/www/fbjjmma
            git pull origin main
            echo "==> Migrando uploads antigos para a raiz..."
            mkdir -p /var/www/fbjjmma/public/uploads/eventos
            if [ -d /var/www/fbjjmma/fbjjmma/public/uploads ]; then
              cp -rn /var/www/fbjjmma/fbjjmma/public/uploads/. /var/www/fbjjmma/public/uploads/ 2>/dev/null || true
            fi
            echo "==> Carregando variáveis de ambiente..."
            [ -f .env ] && set -a && . ./.env && set +a || true
            echo "==> Aplicando migrations via Prisma..."
            npx prisma migrate deploy || echo "Aviso: migrate deploy falhou, tentando SQL direto..."
            echo "==> Aplicando migrations via SQL direto (fallback seguro)..."
            psql "$DATABASE_URL" -c 'ALTER TABLE "events" ADD COLUMN IF NOT EXISTS "isActive" BOOLEAN NOT NULL DEFAULT true;' 2>/dev/null && echo "Migration SQL aplicada." || echo "psql indisponivel, ignorando."
            echo "==> Gerando cliente Prisma..."
            npx prisma generate
            echo "==> Compilando..."
            rm -rf .next
            npm run build
            echo "==> Reiniciando servidor..."
            pm2 stop fbjjmma 2>/dev/null || pm2 stop all 2>/dev/null || true
            pm2 delete fbjjmma 2>/dev/null || pm2 delete all 2>/dev/null || true
            pm2 start npm --name fbjjmma -- start
            pm2 save
            echo "==> Deploy concluído!"
